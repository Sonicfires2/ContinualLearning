core_comparison:
  protocol_id: core_split_cifar100_v2
  comparison_name: task13_core_comparison_split_cifar100
  output_root: experiments/task13_core_comparison
  overwrite: false
  smoke: false
  seeds:
    - 0
    - 1
    - 2
  data_root: data
  download: false
  task_count: 10
  classes_per_task: 10
  split_seed: 0
  epochs_per_task: 1
  batch_size: 32
  eval_batch_size: 128
  learning_rate: 0.01
  device: auto
  hidden_dims:
    - 256
  dropout: 0.0
  target_key: original_class_id
  log_signals: true
  replay_capacity: 2000
  replay_batch_size: 32
  replay_insertion_policy: reservoir_task_end
  fixed_periodic_replay_interval: 1
  fixed_periodic_budget_mode: budget_matched
  min_replay_interval_steps: 1
  max_replay_interval_steps: 64
  scheduler_loss_scale: 5.0
  scheduler_loss_weight: 1.0
  scheduler_uncertainty_weight: 1.0
  scheduler_target_probability_weight: 1.0
  scheduler_loss_increase_weight: 0.5
  scheduler_budget_mode: match_random_replay
